name: Build and Push Docker Image

# This workflow triggers every time you push code to the main or master branch
on:
  push:
    branches:
      - main
      - master 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code from the repository
      - name: Check out the repo
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (Allows for better caching and building)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Docker Hub using the secrets you just created
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build the image and push it to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: smitfaldu/yapreport:latest