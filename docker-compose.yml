version: '3.8'

services:
  yapreport-api:
    build: .
    container_name: yapreport-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Hot-reload your code without rebuilding the container
      - ./src:/app/src
      # Persist downloaded HuggingFace models (Whisper/OmniVoice)
      - ./huggingface_cache:/root/.cache/huggingface
      - ./assets:/app/assets
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]